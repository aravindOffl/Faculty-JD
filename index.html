<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
            background-color: #fafafa;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2c3e50;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            margin: 0;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username-display {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            padding: 8px 15px;
            background: #d9534f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c9302c;
        }

        h1 {
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .toolbar input,
        .toolbar select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            min-height: 44px;
        }

        .toolbar input {
            flex: 1;
            min-width: 200px;
        }

        .toolbar select {
            min-width: 140px;
        }

        .faculty-card {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            border-left: 5px solid #2c3e50;
            transition: all 0.2s ease;
        }

        .faculty-card:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .faculty-card h3 {
            margin: 0 0 5px 0;
        }

        .faculty-card p {
            margin: 0;
            color: #555;
        }

        .pdf-label {
            margin-top: 8px;
            color: #d9534f;
            font-size: 12px;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 15px;
                padding-bottom: 10px;
            }

            .header h1 {
                font-size: 22px;
                width: 100%;
            }

            .user-section {
                width: 100%;
                flex-wrap: wrap;
                gap: 10px;
            }

            .username-display {
                font-size: 12px;
            }

            .logout-btn {
                padding: 10px 15px;
                font-size: 13px;
                min-height: 44px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .toolbar {
                flex-direction: column;
                gap: 8px;
            }

            .toolbar input {
                min-width: 100%;
                width: 100%;
            }

            .toolbar select {
                width: 100%;
                min-width: 100%;
            }

            .faculty-card {
                padding: 12px;
                margin: 8px 0;
                font-size: 14px;
            }

            .faculty-card h3 {
                font-size: 16px;
                margin-bottom: 5px;
            }

            .faculty-card p {
                font-size: 13px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                width: 100%;
                font-size: 24px;
            }

            .user-section {
                width: 100%;
            }

            .toolbar {
                flex-direction: column;
            }

            .toolbar input,
            .toolbar select {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .header {
                flex-wrap: nowrap;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>List of Faculties</h1>
        <div class="user-section">
            <span class="username-display">User: <strong id="displayUsername"></strong></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="toolbar">
        <input
            type="text"
            id="searchBox"
            placeholder="Search faculty by name..."
        >

        <select id="departmentFilter">
            <option value="">All Departments</option>
            <option value="General">General</option>
            <option value="COE">COE</option>
        </select>

        <select id="sortOrder">
            <option value="asc">Ascending (A-Z)</option>
            <option value="desc">Descending (Z-A)</option>
        </select>
    </div>

    <div id="facultyList">Loading...</div>

    <script>

        // ===== AUTHENTICATION CHECK =====
        function checkAuthentication() {
            if (!sessionStorage.getItem("isAuthenticated")) {
                // Redirect to login page if not authenticated
                window.location.href = "auth.html";
                return false;
            }
            return true;
        }

        // Check authentication on page load
        if (!checkAuthentication()) {
            throw new Error("Redirecting to authentication page...");
        }

        // Display username
        const username = sessionStorage.getItem("username");
        document.getElementById("displayUsername").textContent = username || "User";

        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", function() {
            // Clear session storage
            sessionStorage.removeItem("isAuthenticated");
            sessionStorage.removeItem("username");
            
            // Redirect to login page
            window.location.href = "auth.html";
        });

        // (Change password feature removed)

        // ===== FACULTY LIST CODE =====

        const facultyList = document.getElementById("facultyList");
        const sortOrder = document.getElementById("sortOrder");
        const searchBox = document.getElementById("searchBox");
        const departmentFilter = document.getElementById("departmentFilter");

        let allFaculty = [];

        function createFacultyCard(name, designation, clickHandler, isPdf = false) {

            const card = document.createElement("div");
            card.className = "faculty-card";

            card.innerHTML = `
                <h3>${name}</h3>
                <p>${designation || ""}</p>
                ${isPdf ? '<div class="pdf-label">PDF Profile</div>' : ''}
            `;

            card.addEventListener("click", clickHandler);

            facultyList.appendChild(card);
        }

        function renderFacultyList() {

            facultyList.innerHTML = "";

            let filteredFaculty = [...allFaculty];

            const searchText = searchBox.value.trim().toLowerCase();

            /* Search Filter */
            if (searchText !== "") {
                filteredFaculty = filteredFaculty.filter(faculty =>
                    faculty.Name.toLowerCase().includes(searchText)
                );
            }

            /* Department Filter */
            const selectedDepartment = departmentFilter.value;
            if (selectedDepartment !== "") {
                filteredFaculty = filteredFaculty.filter(faculty =>
                    faculty.Department === selectedDepartment
                );
            }

            /* Sorting */
            filteredFaculty.sort((a, b) => {

                const nameA = a.Name.toUpperCase();
                const nameB = b.Name.toUpperCase();

                if (sortOrder.value === "asc") {
                    return nameA.localeCompare(nameB);
                } else {
                    return nameB.localeCompare(nameA);
                }

            });

            /* No Results */
            if (filteredFaculty.length === 0) {
                facultyList.innerHTML = `
                    <div class="no-results">
                        No faculty found.
                    </div>
                `;
                return;
            }

            /* Display Cards */
            filteredFaculty.forEach(faculty => {

                createFacultyCard(
                    faculty.Name,
                    faculty.Designation,
                    faculty.clickHandler,
                    faculty.isPdf
                );

            });
        }

        Promise.all([
            fetch("faculty.json").then(res => res.json()),
            fetch("pdf_faculty.json").then(res => res.json())
        ])
        .then(([facultyData, pdfFacultyData]) => {

            allFaculty = [];

            /* Normal Faculty Profiles */
            facultyData.forEach((faculty, index) => {

                allFaculty.push({
                    Name: faculty.Name,
                    Designation: faculty.Designation,
                    Department: faculty.Department || "General",
                    isPdf: false,
                    clickHandler: () => {
                        window.location.href = `faculty.html?id=${index}`;
                    }
                });

            });

            /* PDF Faculty Profiles */
            pdfFacultyData.forEach((faculty) => {

                allFaculty.push({
                    Name: faculty.Name,
                    Designation: faculty.Designation,
                    Department: faculty.Department || "General",
                    isPdf: true,
                    clickHandler: () => {
                        window.open(faculty.pdf, "_blank");
                    }
                });

            });

            renderFacultyList();

        })
        .catch(error => {

            console.error("Error loading faculty data:", error);

            facultyList.innerHTML = `
                <div class="no-results" style="color:red;">
                    Unable to load faculty data.
                </div>
            `;
        });

        /* Event Listeners */
        sortOrder.addEventListener("change", renderFacultyList);
        searchBox.addEventListener("input", renderFacultyList);
        departmentFilter.addEventListener("change", renderFacultyList);

    </script>

</body>
</html>
