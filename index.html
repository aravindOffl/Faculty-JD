<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty List</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 28px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid #e2e8f0;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .username-display {
            color: #475569;
            font-size: 13px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 18px;
            background: #ffffff;
            color: #ef4444;
            border: 1px solid #fee2e2;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            transform: translateY(-1px);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        .toolbar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            background: #ffffff;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }

        .search-wrapper input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .sort-wrapper {
            position: relative;
            min-width: 200px;
        }

        .sort-wrapper select {
            width: 100%;
            padding: 14px 40px 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            background: #ffffff;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }

        .sort-wrapper select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .select-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .dept-container {
            margin-bottom: 30px;
        }

        .dept-title {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dept-buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .dept-btn {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 14px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .dept-btn:hover {
            background-color: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .dept-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        #facultyList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            scroll-margin-top: 24px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .faculty-card {
            background: #ffffff;
            padding: 22px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .faculty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #6366f1, #4f46e5);
            transition: all 0.3s ease;
        }

        .faculty-card:hover {
            transform: translateY(-4px);
            border-color: #cbd5e1;
            box-shadow: 0 12px 20px -8px rgba(99, 102, 241, 0.12), 0 4px 12px -2px rgba(99, 102, 241, 0.04);
        }

        .faculty-card:hover::before {
            width: 6px;
        }

        .faculty-avatar {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .faculty-info {
            flex-grow: 1;
            min-width: 0;
        }

        .faculty-card h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.4;
        }

        .faculty-card p.designation {
            margin: 0 0 8px 0;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .dept-badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .pdf-badge {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .arrow-indicator {
            color: #94a3b8;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .faculty-card:hover .arrow-indicator {
            color: #4f46e5;
            transform: translateX(4px);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            color: #64748b;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .no-results svg {
            color: #cbd5e1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header {
                padding: 16px 20px;
            }

            .dept-buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #facultyList {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .user-section {
                flex-direction: column;
                align-items: stretch;
            }

            .logout-btn {
                justify-content: center;
            }

            .dept-buttons-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .sort-wrapper {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-logo">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
            </div>
            <h1>Job Directory</h1>
        </div>
        <div class="user-section">
            <div class="user-profile">
                <span class="user-avatar" id="userAvatar">U</span>
                <span class="username-display">User: <strong id="displayUsername"></strong></span>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrapper">
            <div class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <input type="text" id="searchBox" placeholder="Search faculty by name...">
        </div>

        <div class="sort-wrapper">
            <select id="sortOrder">
                <option value="asc">Ascending (A-Z)</option>
                <option value="desc">Descending (Z-A)</option>
            </select>
            <div class="select-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>
    </div>

    <div class="dept-container">
        <div class="dept-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
            Filter by Department
        </div>
        <div id="departmentButtons" class="dept-buttons-grid"></div>
    </div>

    <div id="facultyList">Loading...</div>

    <script>

        // ===== AUTHENTICATION CHECK =====
        function checkAuthentication() {
            if (!sessionStorage.getItem("isAuthenticated")) {
                // Redirect to login page if not authenticated
                window.location.href = "auth.html";
                return false;
            }
            return true;
        }

        // Check authentication on page load
        if (!checkAuthentication()) {
            throw new Error("Redirecting to authentication page...");
        }

        // Display username & user avatar initial
        const username = sessionStorage.getItem("username");
        document.getElementById("displayUsername").textContent = username || "User";
        const initial = (username ? username.charAt(0) : "U").toUpperCase();
        document.getElementById("userAvatar").textContent = initial;

        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", function () {
            // Clear session storage
            sessionStorage.removeItem("isAuthenticated");
            sessionStorage.removeItem("username");

            // Redirect to login page
            window.location.href = "auth.html";
        });

        // (Change password feature removed)

        // ===== FACULTY LIST CODE =====

        const facultyList = document.getElementById("facultyList");
        const sortOrder = document.getElementById("sortOrder");
        const searchBox = document.getElementById("searchBox");

        let allFaculty = [];
        let activeDepartment = "";

        function createFacultyCard(faculty, idx) {
            const card = document.createElement("div");
            card.className = "faculty-card";
            card.style.animationDelay = `${idx * 0.03}s`;

            // Generate initials for avatar
            const initials = faculty.DisplayName
                .split(' ')
                .map(n => n[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();

            card.innerHTML = `
                <div class="faculty-avatar">${initials}</div>
                <div class="faculty-info">
                    <h3>${faculty.DisplayName}</h3>
                    <p class="designation">${faculty.Designation || "Faculty Member"}</p>
                    <div class="card-badges">
                        <span class="dept-badge">${faculty.Department}</span>
                        ${faculty.isPdf ? '<span class="pdf-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> PDF Profile</span>' : ''}
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            `;

            card.addEventListener("click", faculty.clickHandler);

            facultyList.appendChild(card);
        }

        function renderFacultyList() {

            facultyList.innerHTML = "";

            let filteredFaculty = [...allFaculty];

            const searchText = searchBox.value.trim().toLowerCase();

            /* Search Filter */
            if (searchText !== "") {
                filteredFaculty = filteredFaculty.filter(faculty =>
                    faculty.DisplayName.toLowerCase().includes(searchText)
                );
            }

            /* Department Filter */
            const selectedDepartment = activeDepartment;
            if (selectedDepartment !== "") {
                filteredFaculty = filteredFaculty.filter(faculty => {
                    // For S&H, match main department only
                    if (selectedDepartment === "S&H") {
                        const mainDept = faculty.Department.split(' (')[0];
                        return mainDept === "S&H";
                    }
                    // For other departments (including CSE variants), match full department
                    return faculty.Department === selectedDepartment;
                });
            }

            /* Sorting */
            filteredFaculty.sort((a, b) => {

                const nameA = a.DisplayName.toUpperCase();
                const nameB = b.DisplayName.toUpperCase();

                if (sortOrder.value === "asc") {
                    return nameA.localeCompare(nameB);
                } else {
                    return nameB.localeCompare(nameA);
                }

            });

            /* No Results */
            if (filteredFaculty.length === 0) {
                facultyList.innerHTML = `
                    <div class="no-results">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                        <span>No faculty found matching the criteria.</span>
                    </div>
                `;
                return;
            }

            /* Display Cards */
            filteredFaculty.forEach((faculty, idx) => {
                createFacultyCard(faculty, idx);
            });
        }

        Promise.all([
            fetch("faculty.json").then(res => res.json()),
            fetch("pdf_faculty.json").then(res => res.json())
        ])
            .then(([facultyData, pdfFacultyData]) => {

                allFaculty = [];
                const departmentsSet = new Set();

                /* Normal Faculty Profiles */
                facultyData.forEach((faculty, index) => {
                    const mainDept = faculty.Department.split(' (')[0];
                    // Add full department to set (for CSE variants: CSE, CSE (CY), CSE (AI&ML))
                    // For S&H, we'll handle it specially in the dropdown
                    if (mainDept === "S&H") {
                        departmentsSet.add("S&H");
                    } else {
                        departmentsSet.add(faculty.Department);
                    }

                    allFaculty.push({
                        DisplayName: faculty["Name of the faculty"] || faculty.Name,
                        Name: faculty.Name,
                        Designation: faculty.Designation,
                        Department: faculty.Department,
                        MainDepartment: mainDept,
                        isPdf: false,
                        clickHandler: () => {
                            // Save selected department before navigating
                            sessionStorage.setItem('selectedDepartment', activeDepartment);
                            window.location.href = `faculty.html?id=${index}`;
                        }
                    });
                });

                /* PDF Faculty Profiles */
                pdfFacultyData.forEach((faculty) => {
                    const mainDept = faculty.Department.split(' (')[0];
                    // Add full department to set (for CSE variants: CSE, CSE (CY), CSE (AI&ML))
                    // For S&H, we'll handle it specially in the dropdown
                    if (mainDept === "S&H") {
                        departmentsSet.add("S&H");
                    } else {
                        departmentsSet.add(faculty.Department);
                    }

                    allFaculty.push({
                        DisplayName: faculty["Name of the faculty"] || faculty.Name,
                        Name: faculty.Name,
                        Designation: faculty.Designation,
                        Department: faculty.Department,
                        MainDepartment: mainDept,
                        isPdf: true,
                        clickHandler: () => {
                            window.open(faculty.pdf, "_blank");
                        }
                    });
                });

                // Populate department buttons
                const departmentButtonsContainer = document.getElementById("departmentButtons");
                const uniqueDepts = Array.from(departmentsSet).sort();

                function updateDepartmentButtons() {
                    departmentButtonsContainer.innerHTML = "";

                    // "All Departments" button
                    const allBtn = document.createElement("button");
                    allBtn.type = "button";
                    allBtn.className = "dept-btn" + (activeDepartment === "" ? " active" : "");
                    allBtn.textContent = "All Departments";
                    allBtn.addEventListener("click", () => {
                        setActiveDepartment("");
                    });
                    departmentButtonsContainer.appendChild(allBtn);

                    uniqueDepts.forEach(dept => {
                        const btn = document.createElement("button");
                        btn.type = "button";
                        btn.className = "dept-btn" + (activeDepartment === dept ? " active" : "");
                        btn.textContent = dept;
                        btn.addEventListener("click", () => {
                            setActiveDepartment(dept);
                        });
                        departmentButtonsContainer.appendChild(btn);
                    });
                }

                // Restore selected department from sessionStorage
                const savedDepartment = sessionStorage.getItem('selectedDepartment');
                if (savedDepartment) {
                    activeDepartment = savedDepartment;
                    sessionStorage.removeItem('selectedDepartment');
                }

                updateDepartmentButtons();

                renderFacultyList();

            })
            .catch(error => {

                console.error("Error loading faculty data:", error);

                facultyList.innerHTML = `
                <div class="no-results" style="color:red;">
                    Unable to load faculty data.
                </div>
            `;
            });

        /* Event Listeners */
        sortOrder.addEventListener("change", renderFacultyList);
        searchBox.addEventListener("input", renderFacultyList);

        function setActiveDepartment(dept) {
            activeDepartment = dept;
            sessionStorage.setItem('lastSelectedDepartment', dept);

            // Update active styling
            const buttons = document.querySelectorAll(".dept-btn");
            buttons.forEach(btn => {
                const isAllBtn = btn.textContent === "All Departments";
                if ((isAllBtn && dept === "") || (!isAllBtn && btn.textContent === dept)) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });

            renderFacultyList();

            // Smooth scroll to faculty list
            facultyList.scrollIntoView({ behavior: "smooth", block: "start" });
        }

    </script>

</body>

</html>
