<!DOCTYPE html>
<html>
<head>
    <title>Faculty Details</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: #ffffff;
            color: #475569;
            text-decoration: none;
            border-radius: 9999px;
            margin-bottom: 24px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            outline: none;
        }

        .back-button:hover {
            background-color: #f1f5f9;
            color: #0f172a;
            border-color: #cbd5e1;
            transform: translateX(-2px);
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
        }

        .profile-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .pdf-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white !important;
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
            border: none;
            cursor: pointer;
            outline: none;
        }

        .pdf-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.25);
            background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
        }

        .pdf-btn svg {
            stroke: currentColor;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.15);
        }

        .profile-title-area h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .profile-title-area p {
            color: #64748b;
            font-size: 15px;
            font-weight: 500;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .profile-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
        }

        .card-header {
            background: #f8fafc;
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4f46e5;
        }

        .card-header h3 {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #0f172a;
        }

        .card-body {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 24px;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Span 2 columns for long text fields */
        .info-group.full-width {
            grid-column: 1 / -1;
        }

        .info-group label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.5;
        }

        ul.constraints-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 6px;
        }

        ul.constraints-list li {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        ul.constraints-list li::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #4f46e5;
            flex-shrink: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .profile-header {
                padding: 20px 16px;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 16px;
            }

            .profile-header-left {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            .card-body {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 16px;
            }

            ul.constraints-list {
                grid-template-columns: 1fr;
            }
        }

        .card-body-hours {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .hour-circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            background: #ffffff;
            padding: 16px 12px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hour-circle-item:hover {
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -2px rgba(0, 0, 0, 0.01);
        }

        .circle-svg-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring-fill {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hour-circle-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hour-circle-label {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            line-height: 1.4;
        }

        .hour-circle-pct {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <button class="back-button" onclick="window.history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Directory
    </button>

    <div id="details">
        <div style="text-align: center; padding: 40px; color: #64748b; font-weight: 500;">Loading details...</div>
    </div>

    <script>
        const generateWorkHoursCard = (total, items) => {
            const totalNum = parseFloat(total) || 42;
            let cardHtml = `
                <div class="profile-card">
                    <div class="card-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <h3>Work Hours Distribution (Total: ${totalNum} hrs/week)</h3>
                    </div>
                    <div class="card-body-hours">
            `;

            items.forEach(item => {
                const valueNum = parseFloat(item.value) || 0;
                const pct = totalNum > 0 ? Math.min(100, Math.max(0, (valueNum / totalNum) * 100)) : 0;
                
                const c = 201.06;
                const offset = c * (1 - pct / 100);
                
                const strokeColor = item.color || "#6366f1";
                
                cardHtml += `
                    <div class="hour-circle-item">
                        <div class="circle-svg-wrapper">
                            <svg width="84" height="84" viewBox="0 0 84 84" class="progress-ring">
                                <circle cx="42" cy="42" r="32" class="progress-ring-bg" stroke="#f8fafc" stroke-width="6" fill="transparent"></circle>
                                <circle cx="42" cy="42" r="32" class="progress-ring-fill" stroke="${strokeColor}" stroke-width="6" fill="transparent"
                                        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
                                        transform="rotate(-90 42 42)"></circle>
                                <text x="50%" y="50%" text-anchor="middle" dy=".3em" class="progress-ring-text" font-size="15" font-weight="800" fill="#1e293b">${valueNum}h</text>
                            </svg>
                        </div>
                        <div class="hour-circle-info">
                            <span class="hour-circle-label">${item.label}</span>
                            <span class="hour-circle-pct" style="color: ${strokeColor}">${pct.toFixed(1)}%</span>
                        </div>
                    </div>
                `;
            });

            cardHtml += `
                    </div>
                </div>
            `;
            return cardHtml;
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type');

        const isCoe = type === 'coe';
        const isTraining = type === 'training';

        let dataUrl = 'faculty.json';
        if (isCoe) dataUrl = 'coe.json';
        if (isTraining) dataUrl = 'training.json';

        fetch(dataUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Unable to load " + dataUrl);
                }
                return response.json();
            })
            .then(data => {

                if (!data[id]) {
                    document.getElementById('details').innerHTML =
                        "<p>Faculty record not found.</p>";
                    return;
                }

                const faculty = data[id];

                if (isTraining) {
                    // Generate initials for avatar
                    const initials = faculty["NAME"]
                        ? faculty["NAME"].trim().split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase()
                        : "TR";

                    let pdfButtonHtml = "";
                    const name = faculty["NAME"] || "";
                    if (name.toLowerCase().replace(/[\s\.\,\-\_]/g, '').includes("ponhiniyadsylvia")) {
                        pdfButtonHtml = `
                            <a href="pdf profile/Heads and Deans/HeadTraining.pdf" target="_blank" class="pdf-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                View PDF Profile
                            </a>
                        `;
                    }

                    let headerHtml = `
                        <div class="profile-header">
                            <div class="profile-header-left">
                                <div class="profile-avatar">${initials}</div>
                                <div class="profile-title-area">
                                    <h1>${faculty["NAME"]}</h1>
                                    <p>${faculty["DESIGNATION"] || "Faculty Member"} &bull; Training Department</p>
                                </div>
                            </div>
                            ${pdfButtonHtml}
                        </div>
                    `;

                    let html = headerHtml + '<div class="profile-grid">';

                    /* General Information Card for Training */
                    html += `
                        <div class="profile-card">
                            <div class="card-header">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <h3>General Information</h3>
                            </div>
                            <div class="card-body">
                    `;
                    const trainingInfoFields = [
                        { label: "Full Name", key: "NAME" },
                        { label: "Designation", key: "DESIGNATION" },
                        { label: "Reporting To", key: "REPORTING TO" },
                        { label: "Date of Joining", key: "DATE  OF JOINING" }
                    ];

                    trainingInfoFields.forEach(field => {
                        const val = faculty[field.key];
                        if (val !== undefined && val !== "") {
                            html += `
                                <div class="info-group">
                                    <label>${field.label}</label>
                                    <div class="info-value">${val}</div>
                                </div>
                            `;
                        }
                    });
                    html += `
                            </div>
                        </div>
                    `;

                    /* Job & Responsibility Card for Training */
                    html += `
                        <div class="profile-card">
                            <div class="card-header">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                                <h3>Responsibilities & Growth</h3>
                            </div>
                            <div class="card-body">
                    `;
                    const trainingResponsibilityFields = [
                        { label: "Other Responsibility", key: "OTHER RESPONSIBILITY", fullWidth: true },
                        { label: "Personal Growth or Learning", key: "PERSONAL GROWTH OR LEARNING", fullWidth: true },
                        { label: "Job Summary", key: "JD SUMMARY", fullWidth: true }
                    ];

                    trainingResponsibilityFields.forEach(field => {
                        const val = faculty[field.key];
                        if (val !== undefined && val !== "") {
                            const valueFormatted = val.replace ? val.replace(/\r\n/g, '<br>') : val;
                            html += `
                                <div class="info-group ${field.fullWidth ? 'full-width' : ''}">
                                    <label>${field.label}</label>
                                    <div class="info-value">${valueFormatted}</div>
                                </div>
                            `;
                        }
                    });
                    html += `
                            </div>
                        </div>
                    `;

                    /* Work Hours Distribution Card for Training */
                    const totalHours = faculty["TOTAL WORKING HOURS PER WEEK"] || 42;
                    const items = [
                        { label: "Teaching Hours per Week", value: faculty["HOURS SPENT HANDLING CLASSES"] || 0, color: "#6366f1" },
                        { label: "Hours for Preparation", value: faculty["HOURS ALLOCATED FOR PREPARATION"] || 0, color: "#10b981" },
                        { label: "Hours for Self Development", value: faculty["HOURS ALLOCATED FOR SELF-DEVELOPMENT"] || 0, color: "#f43f5e" },
                        { label: "Hours for Assessment and Report", value: faculty["HOURS ALLOCATED FOR ASSESSMENT AND REPORT"] || 0, color: "#8b5cf6" }
                    ];
                    html += generateWorkHoursCard(totalHours, items);

                    html += "</div>";
                    document.getElementById('details').innerHTML = html;
                    return;
                }

                if (isCoe) {
                    // Generate initials for avatar
                    const initials = faculty["FULL NAME"]
                        ? faculty["FULL NAME"].trim().split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase()
                        : "FC";

                    let headerHtml = `
                        <div class="profile-header">
                            <div class="profile-header-left">
                                <div class="profile-avatar">${initials}</div>
                                <div class="profile-title-area">
                                    <h1>${faculty["FULL NAME"]}</h1>
                                    <p>${faculty["DESIGNATION"] || "Faculty Member"} &bull; CENTER OF EXCELLENCE | RAISE SMART SCHOOL OF TECHNOLOGY</p>
                                </div>
                            </div>
                        </div>
                    `;

                    let html = headerHtml + '<div class="profile-grid">';

                    /* General Information Card for COE */
                    html += `
                        <div class="profile-card">
                            <div class="card-header">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <h3>General Information</h3>
                            </div>
                            <div class="card-body">
                    `;
                    const coeInfoFields = [
                        { label: "Full Name", key: "FULL NAME" },
                        { label: "Designation", key: "DESIGNATION" },
                        { label: "Employee ID", key: "EMPLOYEE ID" },
                        { label: "Email", key: "EMAIL" },
                        { label: "Phone Number", key: "PHONE NUMBER" },
                        { label: "Date of Joining", key: "DATE OF JOINING" },
                        { label: "Highest Qualification", key: "HIGHEST QUALIFICATION" },
                        { label: "PhD?", key: "PhD?\r\n" },
                        { label: "Experience inside RTC", key: "INSIDE EXPERIENCE IN YesRS", suffix: " years" },
                        { label: "Other Experience", key: "OUTSIDE EXPERIENCE IN YesRS", suffix: " years" }
                    ];

                    coeInfoFields.forEach(field => {
                        const val = faculty[field.key] !== undefined ? faculty[field.key] : faculty[field.key.replace('\r\n', '')];
                        if (val !== undefined && val !== "") {
                            let displayVal = val;
                            if (field.suffix && !isNaN(val) && val !== "NIL" && val !== "N/A" && val !== "NA") {
                                displayVal += field.suffix;
                            }
                            html += `
                                <div class="info-group">
                                    <label>${field.label}</label>
                                    <div class="info-value">${displayVal}</div>
                                </div>
                            `;
                        }
                    });
                    html += `
                            </div>
                        </div>
                    `;

                    /* Training & Specialization Card for COE */
                    html += `
                        <div class="profile-card">
                            <div class="card-header">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
                                <h3>Training & Specialization</h3>
                            </div>
                            <div class="card-body">
                    `;
                    const coeTrainingFields = [
                        { label: "Specialization in Last Degree", key: "YOUR SPECIALIZATION IN THE LAST DEGREE2" },
                        { label: "Current Specialization Training", key: "IF YOU ARE TRAINING YOURSELF IN A PARTICULAR SPECIALIZATION - MENTION HERE" },
                        { label: "List of Subjects Handled", key: "LIST OF SUBJECTS HANDLED\r\n", fullWidth: true },
                        { label: "Courses Completed", key: "LIST OF COURSE COMPLETED2", fullWidth: true },
                        { label: "Courses Developed", key: "COURSES DEVELOPED\\", fullWidth: true },
                        { label: "Class Handling Sessions", key: "NUMBER OF CLASS HANDLING SESSIONS" }
                    ];

                    coeTrainingFields.forEach(field => {
                        const val = faculty[field.key] !== undefined ? faculty[field.key] : faculty[field.key.replace('\r\n', '').replace('\\', '')];
                        if (val !== undefined && val !== "") {
                            const valueFormatted = val.replace ? val.replace(/\r\n/g, '<br>') : val;
                            html += `
                                <div class="info-group ${field.fullWidth ? 'full-width' : ''}">
                                    <label>${field.label}</label>
                                    <div class="info-value">${valueFormatted}</div>
                                </div>
                            `;
                        }
                    });
                    html += `
                            </div>
                        </div>
                    `;

                    /* Work Hours Distribution Card for COE */
                    const totalHours = faculty["TOTAL HOURS PER WEEK"] || 42;
                    const items = [
                        { label: "Teaching Hours per Week", value: faculty["HOURS SPENT HANDLING CLASSES"] || 0, color: "#6366f1" },
                        { label: "Hours for Preparation", value: faculty["HOURS ALLOCATED FOR PREPARATION"] || 0, color: "#10b981" },
                        { label: "Hours for Additional Responsibilities", value: 0, color: "#f59e0b" },
                        { label: "Hours for Self Development", value: faculty["HOURS ALLOCATED FOR SELF-DEVELOPMENT"] || 0, color: "#f43f5e" }
                    ];
                    html += generateWorkHoursCard(totalHours, items);

                    html += "</div>";
                    document.getElementById('details').innerHTML = html;
                    return;
                }

                const getFacultyValue = (fac, field) => {
                    if (fac[field] !== undefined) return fac[field];
                    const normField = field.toLowerCase().replace(/[^a-z0-9]/g, '');
                    for (let key in fac) {
                        if (key.toLowerCase().replace(/[^a-z0-9]/g, '') === normField) {
                            return fac[key];
                        }
                    }
                    return undefined;
                };

                /* Faculty Information */
                const facultyInfoFields = [
                    "Name of the faculty",
                    "Job Title",
                    "DOJ",
                    "Qualification",
                    "Experience in RTC (as on 30.06.2026) Eg: 3 years 11 months 25 days",
                    "Other Experiences in years,months,days",
                    "Department",
                    "Reporting To (Name and Designation)"
                ];

                /* Teaching Responsibilities */
                const teachingFields = [
                    "No.of Theory Papers handling",
                    "No.of Practical Papers handling",
                    "No.of Theory cum Practical Papers handling      "
                ];

                /* Responsibilities */
                const responsibilityFields = [
                    "No.of mentees"
                ];

                /* Administrative and Institutional Responsibilities */
                const adminFields = [
                    "Additional Responsibilities in Dept. \r\n(Ex: IQAC Coordinator, Exam cell Coordinator.\r\nPlease mention the activities being performed for this responsibilities)",
                    "Additional Responsibilities in Institute \r\n(Ex: NSS Incharge, Antidrug Committee Incharge.\r\nPlease mention the activities being performed for this responsibility)"
                ];

                /* Self-Development */
                const selfDevelopmentFields = [
                    "No.of Paper publications in 26-27 (target)",
                    "No.of Patent publications in 26-27 (target)",
                    "No.of Scheme Proposals submission in 26-27 (target)",
                    "No.of Project Proposals submission in 26-27 (target)",
                    "No.of KPI submissions in 26-27 (target)",
                    "Exceptional Initiatives"
                ];

                /* Work Hours Distribution Mapping */
                const getWorkHoursData = (fac) => {
                    const total = fac["Total Hours per week"] !== undefined ? fac["Total Hours per week"] : fac["Total Hours per Week"];
                    const teaching = fac["Teaching Hours per week"] !== undefined ? fac["Teaching Hours per week"] : fac["Teaching Hours per Week"];
                    const prep = fac["Hours for Preparation"];
                    const admin = fac["Hours for Additional Resposibilities"] !== undefined ? fac["Hours for Additional Resposibilities"] : fac["Hours for Additional Responsibilities"];
                    const self = fac["Hours for Self Development"];
                    return [
                        { label: "Total Hours per Week", value: total },
                        { label: "Teaching Hours per Week", value: teaching },
                        { label: "Hours for Preparation", value: prep },
                        { label: "Hours for Additional Responsibilities", value: admin },
                        { label: "Hours for Self Development", value: self }
                    ];
                };

                // Generate initials for avatar
                const initials = faculty["Name of the faculty"]
                    ? faculty["Name of the faculty"].split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase()
                    : "FC";

                // Check if this faculty is one of the HODs
                const facultyName = faculty["Name of the faculty"] || faculty.Name || "";
                const normalizedFacultyName = facultyName.toLowerCase().replace(/[\s\.\,\-\_]/g, '');
                const hodNames = [
                    "vijayasekarang", "gvijayasekaran",
                    "karthickls", "lskarthick",
                    "karthikar", "rkarthika",
                    "drmamutha",
                    "drpmshiyana", "drpmshiyanashain"
                ];
                const isHOD = hodNames.some(t => normalizedFacultyName.includes(t) || t.includes(normalizedFacultyName));

                let pdfButtonHtml = "";
                if (isHOD) {
                    pdfButtonHtml = `
                        <a href="pdf profile/Heads and Deans/Heads.pdf" target="_blank" class="pdf-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            View PDF Profile
                        </a>
                    `;
                } else if (normalizedFacultyName.includes("ananthij")) {
                    pdfButtonHtml = `
                        <a href="pdf profile/Team/Head – Industry Relations – School of Computing.pdf" target="_blank" class="pdf-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            View PDF Profile
                        </a>
                    `;
                } else if (normalizedFacultyName.includes("selvapandian")) {
                    pdfButtonHtml = `
                        <a href="pdf profile/Team/Head - Internal Examinations - School of Computing.pdf" target="_blank" class="pdf-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            View PDF Profile
                        </a>
                    `;
                }

                let headerHtml = `
                    <div class="profile-header">
                        <div class="profile-header-left">
                            <div class="profile-avatar">${initials}</div>
                            <div class="profile-title-area">
                                <h1>${facultyName}</h1>
                                <p>${faculty.Designation || "Faculty Member"} &bull; ${faculty.Department}</p>
                            </div>
                        </div>
                        ${pdfButtonHtml}
                    </div>
                `;

                let html = headerHtml + '<div class="profile-grid">';

                /* Faculty Information Card */
                html += `
                    <div class="profile-card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <h3>General Information</h3>
                        </div>
                        <div class="card-body">
                `;
                facultyInfoFields.forEach(field => {
                    const value = getFacultyValue(faculty, field);
                    if (value !== undefined) {
                        let displayLabel = field.replace(/\r\n/g, ' ').replace(/\n/g, ' ').trim();
                        displayLabel = displayLabel.replace(/\s*Eg:.*$/i, '').trim();
                        html += `
                            <div class="info-group">
                                <label>${displayLabel}</label>
                                <div class="info-value">${value}</div>
                            </div>
                        `;
                    }
                });
                html += `
                        </div>
                    </div>
                `;

                /* Teaching Responsibilities */
                html += `
                    <div class="profile-card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                            <h3>Teaching Responsibilities</h3>
                        </div>
                        <div class="card-body">
                `;
                teachingFields.forEach(field => {
                    const value = getFacultyValue(faculty, field);
                    if (value !== undefined) {
                        html += `
                            <div class="info-group">
                                <label>${field.trim()}</label>
                                <div class="info-value">${value}</div>
                            </div>
                        `;
                    }
                });
                html += `
                        </div>
                    </div>
                `;

                /* Tutor Responsibilities */
                html += `
                    <div class="profile-card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <h3>Tutor Responsibilities</h3>
                        </div>
                        <div class="card-body">
                `;
                responsibilityFields.forEach(field => {
                    const value = getFacultyValue(faculty, field);
                    if (value !== undefined) {
                        html += `
                            <div class="info-group">
                                <label>${field}</label>
                                <div class="info-value">${value}</div>
                            </div>
                        `;
                    }
                });
                html += `
                            <div class="info-group full-width">
                                <label>Constraints & Requirements</label>
                                <ul class="constraints-list">
                                    <li>Maintain attendance & academic records</li>
                                    <li>Mentor & counsel students</li>
                                    <li>Parent call register & meetings</li>
                                    <li>Monitoring Student Growth Card</li>
                                </ul>
                            </div>
                        `;
                html += `
                        </div>
                    </div>
                `;

                /* Work Hours Distribution */
                const totalHours = faculty["Total Hours per week"] !== undefined ? faculty["Total Hours per week"] : faculty["Total Hours per Week"];
                const teaching = faculty["Teaching Hours per week"] !== undefined ? faculty["Teaching Hours per week"] : faculty["Teaching Hours per Week"];
                const prep = faculty["Hours for Preparation"];
                const admin = faculty["Hours for Additional Resposibilities"] !== undefined ? faculty["Hours for Additional Resposibilities"] : faculty["Hours for Additional Responsibilities"];
                const self = faculty["Hours for Self Development"];

                const hasWorkHours = totalHours !== undefined || teaching !== undefined || prep !== undefined || admin !== undefined || self !== undefined;
                if (hasWorkHours) {
                    const totalNum = parseFloat(totalHours) || 42;
                    const items = [
                        { label: "Teaching Hours per Week", value: teaching || 0, color: "#6366f1" },
                        { label: "Hours for Preparation", value: prep || 0, color: "#10b981" },
                        { label: "Hours for Additional Responsibilities", value: admin || 0, color: "#f59e0b" },
                        { label: "Hours for Self Development", value: self || 0, color: "#f43f5e" }
                    ];
                    html += generateWorkHoursCard(totalNum, items);
                }

                /* Administrative and Institutional Responsibilities */
                html += `
                    <div class="profile-card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line></svg>
                            <h3>Administrative & Institutional Responsibilities</h3>
                        </div>
                        <div class="card-body">
                `;
                adminFields.forEach(field => {
                    const value = getFacultyValue(faculty, field);
                    if (value !== undefined) {
                        const valueFormatted = value ? value.replace(/\r\n/g, '<br>') : '';
                        html += `
                            <div class="info-group full-width">
                                <label>${field.replace(/\r\n/g, ' ')}</label>
                                <div class="info-value">${valueFormatted}</div>
                            </div>
                        `;
                    }
                });
                html += `
                        </div>
                    </div>
                `;

                /* Self-Development */
                html += `
                    <div class="profile-card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <h3>Self-Development Targets</h3>
                        </div>
                        <div class="card-body">
                `;
                selfDevelopmentFields.forEach(field => {
                    const value = getFacultyValue(faculty, field);
                    if (value !== undefined) {
                        const isFullWidth = field === "Exceptional Initiatives";
                        html += `
                            <div class="info-group ${isFullWidth ? 'full-width' : ''}">
                                <label>${field}</label>
                                <div class="info-value">${value}</div>
                            </div>
                        `;
                    }
                });
                html += `
                        </div>
                    </div>
                `;

                html += "</div>";

                document.getElementById('details').innerHTML = html;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('details').innerHTML =
                    "<p>Error loading faculty details.</p>";
            });
    </script>

</body>
</html>
