<!DOCTYPE html>
<html>
<head>
    <title>Faculty Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            vertical-align: top;
        }

        td:first-child {
            font-weight: bold;
            width: 35%;
            background-color: #f5f5f5;
        }

        .section-heading {
            background-color: #2c3e50;
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Faculty Details</h1>

    <div id="details">Loading...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        fetch('faculty.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Unable to load faculty.json");
                }
                return response.json();
            })
            .then(data => {

                if (!data[id]) {
                    document.getElementById('details').innerHTML =
                        "<p>Faculty record not found.</p>";
                    return;
                }

                const faculty = data[id];

                /* Faculty Information */
                const facultyInfoFields = [
                    "Name of the faculty",
                    "Job Title",
                    "DOJ",
                    "Qualification",
                    "Experience in RTC (as on 30.06.2026) Eg: 3 years 11 months 25 days",
                    "Other Experiences in years,months,days",
                    "Department",
                    "Reporting To (Name and Designation)"
                ];

                /* Teaching Responsibilities */
                const teachingFields = [
                    "No.of Theory Papers handling",
                    "No.of Practical Papers handling",
                    "No.of Theory cum Practical Papers handling      "
                ];

                /* Responsibilities */
                const responsibilityFields = [
                    "No.of mentees"
                ];

                /* Administrative and Institutional Responsibilities */
                const adminFields = [
                    "Additional Responsibilities in Dept. \r\n(Ex: IQAC Coordinator, Exam cell Coordinator.\r\nPlease mention the activities being performed for this responsibilities)",
                    "Additional Responsibilities in Institute \r\n(Ex: NSS Incharge, Antidrug Committee Incharge.\r\nPlease mention the activities being performed for this responsibility)"
                ];

                /* Self-Development */
                const selfDevelopmentFields = [
                    "No.of Paper publications in 26-27 (target)",
                    "No.of Patent publications in 26-27 (target)",
                    "No.of Scheme Proposals submission in 26-27 (target)",
                    "No.of Project Proposals submission in 26-27 (target)",
                    "No.of KPI submissions in 26-27 (target)",
                    "Exceptional Initiatives"
                ];

                let html = "<table>";

                /* Faculty Information */
                html += `
                    <tr>
                        <td colspan="2" class="section-heading">
                            Faculty Information
                        </td>
                    </tr>
                `;

                facultyInfoFields.forEach(field => {
                    if (faculty[field] !== undefined) {
                        html += `
                            <tr>
                                <td>${field}</td>
                                <td>${faculty[field]}</td>
                            </tr>
                        `;
                    }
                });

                /* Teaching Responsibilities */
                html += `
                    <tr>
                        <td colspan="2" class="section-heading">
                            Teaching Responsibilities
                        </td>
                    </tr>
                `;

                teachingFields.forEach(field => {
                    if (faculty[field] !== undefined) {
                        html += `
                            <tr>
                                <td>${field.trim()}</td>
                                <td>${faculty[field]}</td>
                            </tr>
                        `;
                    }
                });

                /* Tutor Responsibilities */
                html += `
                    <tr>
                        <td colspan="2" class="section-heading">
                            Tutor Responsibilities
                        </td>
                    </tr>
                `;

                responsibilityFields.forEach(field => {
                    if (faculty[field] !== undefined) {
                        html += `
                            <tr>
                                <td>${field}</td>
                                <td>${faculty[field]}</td>
                            </tr>
                        `;
                    }
                });

                html += `
                    <tr>
                        <td>Constraints</td>
                        <td>
                            <ul>
                                <li>Maintain attendance and academic records</li>
                                <li>Mentor and counsel students</li>
                                <li>Parent call register and Parent meeting</li>
                                <li>Monitoring Student Growth Card</li>
                            </ul>
                        </td>
                    </tr>
                `;

                /* Administrative and Institutional Responsibilities */
                html += `
                    <tr>
                        <td colspan="2" class="section-heading">
                            Administrative and Institutional Responsibilities
                        </td>
                    </tr>
                `;

                adminFields.forEach(field => {
                    if (faculty[field] !== undefined) {
                        html += `
                            <tr>
                                <td>${field}</td>
                                <td>${faculty[field]}</td>
                            </tr>
                        `;
                    }
                });

                /* Self-Development */
                html += `
                    <tr>
                        <td colspan="2" class="section-heading">
                            Self-Development
                        </td>
                    </tr>
                `;

                selfDevelopmentFields.forEach(field => {
                    if (faculty[field] !== undefined) {
                        html += `
                            <tr>
                                <td>${field}</td>
                                <td>${faculty[field]}</td>
                            </tr>
                        `;
                    }
                });


                html += "</table>";

                document.getElementById('details').innerHTML = html;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('details').innerHTML =
                    "<p>Error loading faculty details.</p>";
            });
    </script>

</body>
</html>
