<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1e293b;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 16px -6px rgba(0, 0, 0, 0.03);
            width: 100%;
            max-width: 420px;
            border: 1px solid #e2e8f0;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
        }

        .login-container h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .form-group input:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            outline: none;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #fee2e2;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .info-text {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            margin-top: 24px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
            </div>
            <h1>Faculty Portal</h1>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="info-text">
            Demo credentials: admin / admin
        </div>
    </div>

    <script>
        const CREDENTIALS_KEY = 'faculty_auth_credentials';

        // Initialize credentials in localStorage if not present
        function loadCredentials() {
            const raw = localStorage.getItem(CREDENTIALS_KEY);
            if (!raw) {
                const defaultCreds = { username: 'admin', password: 'admin' };
                localStorage.setItem(CREDENTIALS_KEY, JSON.stringify(defaultCreds));
                return defaultCreds;
            }
            try {
                return JSON.parse(raw);
            } catch (e) {
                const defaultCreds = { username: 'admin', password: 'admin' };
                localStorage.setItem(CREDENTIALS_KEY, JSON.stringify(defaultCreds));
                return defaultCreds;
            }
        }

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        const creds = loadCredentials();

        // If already logged in, go to index
        if (sessionStorage.getItem('isAuthenticated')) {
            window.location.href = 'index.html';
        }

        // Show demo credentials for first-time users
        const infoText = document.querySelector('.info-text');
        if (infoText) {
            infoText.textContent = `username: ${creds.username} | password: ${creds.password}`;
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (username === creds.username && password === creds.password) {
                sessionStorage.setItem('isAuthenticated', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = 'Invalid username or password. Please try again.';
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Clear error message on input
        usernameInput.addEventListener('input', function () {
            if (errorMessage.style.display === 'block') errorMessage.style.display = 'none';
        });
        passwordInput.addEventListener('input', function () {
            if (errorMessage.style.display === 'block') errorMessage.style.display = 'none';
        });
    </script>
</body>
</html>
