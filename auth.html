<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d9534f;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }

            .login-container h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                padding: 14px;
                font-size: 16px;
            }

            .login-btn {
                padding: 14px;
                font-size: 16px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .login-container {
                padding: 35px;
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>User Authentication</h1>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="info-text">
            Demo credentials: admin / admin
        </div>
    </div>

    <script>
        const CREDENTIALS_KEY = 'faculty_auth_credentials';

        // Initialize credentials in localStorage if not present
        function loadCredentials() {
            const raw = localStorage.getItem(CREDENTIALS_KEY);
            if (!raw) {
                const defaultCreds = { username: 'admin', password: 'admin' };
                localStorage.setItem(CREDENTIALS_KEY, JSON.stringify(defaultCreds));
                return defaultCreds;
            }
            try {
                return JSON.parse(raw);
            } catch (e) {
                const defaultCreds = { username: 'admin', password: 'admin' };
                localStorage.setItem(CREDENTIALS_KEY, JSON.stringify(defaultCreds));
                return defaultCreds;
            }
        }

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        const creds = loadCredentials();

        // If already logged in, go to index
        if (sessionStorage.getItem('isAuthenticated')) {
            window.location.href = 'index.html';
        }

        // Show demo credentials for first-time users
        const infoText = document.querySelector('.info-text');
        if (infoText) {
            infoText.textContent = `username: ${creds.username} | password: ${creds.password}`;
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (username === creds.username && password === creds.password) {
                sessionStorage.setItem('isAuthenticated', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = 'Invalid username or password. Please try again.';
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Clear error message on input
        usernameInput.addEventListener('input', function () {
            if (errorMessage.style.display === 'block') errorMessage.style.display = 'none';
        });
        passwordInput.addEventListener('input', function () {
            if (errorMessage.style.display === 'block') errorMessage.style.display = 'none';
        });
    </script>
</body>
</html>
