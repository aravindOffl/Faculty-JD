<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COE Department Directory</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', Arial, sans-serif;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 28px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .portal-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            border: 1px solid transparent;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.15);
        }

        .portal-toggle-btn:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.25);
        }

        .portal-toggle-btn:active {
            transform: translateY(0);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid #e2e8f0;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #10b981;
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .username-display {
            color: #475569;
            font-size: 13px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 18px;
            background: #ffffff;
            color: #ef4444;
            border: 1px solid #fee2e2;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            transform: translateY(-1px);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        .toolbar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            background: #ffffff;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }

        .search-wrapper input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }

        .sort-wrapper {
            position: relative;
            min-width: 200px;
        }

        .sort-wrapper select {
            width: 100%;
            padding: 14px 40px 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            background: #ffffff;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }

        .sort-wrapper select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }

        .select-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .dept-container {
            margin-bottom: 30px;
        }

        .dept-title {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dept-buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .dept-btn {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 14px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .dept-btn:hover {
            background-color: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .dept-btn.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        #facultyList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            scroll-margin-top: 24px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .faculty-card {
            background: #ffffff;
            padding: 22px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .faculty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #10b981, #059669);
            transition: all 0.3s ease;
        }

        .faculty-card:hover {
            transform: translateY(-4px);
            border-color: #cbd5e1;
            box-shadow: 0 12px 20px -8px rgba(16, 185, 129, 0.12), 0 4px 12px -2px rgba(16, 185, 129, 0.04);
        }

        .faculty-card:hover::before {
            width: 6px;
        }

        .faculty-avatar {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #047857;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .faculty-info {
            flex-grow: 1;
            min-width: 0;
        }

        .faculty-card h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.4;
        }

        .faculty-card p.designation {
            margin: 0 0 8px 0;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .dept-badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .email-badge {
            background-color: #ecfdf5;
            color: #047857;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow-indicator {
            color: #94a3b8;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .faculty-card:hover .arrow-indicator {
            color: #059669;
            transform: translateX(4px);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            color: #64748b;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .no-results svg {
            color: #cbd5e1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header {
                padding: 16px 20px;
            }

            .dept-buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #facultyList {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .user-section {
                flex-direction: column;
                align-items: stretch;
            }

            .logout-btn {
                justify-content: center;
            }

            .dept-buttons-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .sort-wrapper {
                width: 100%;
            }
        }

        .search-suggestions-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 16px -6px rgba(0, 0, 0, 0.04);
            max-height: 260px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.15s ease;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: #f1f5f9;
        }

        .suggestion-name {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .suggestion-dept {
            font-size: 11px;
            font-weight: 600;
            background: #ecfdf5;
            color: #047857;
            padding: 2px 8px;
            border-radius: 9999px;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion-item:hover .suggestion-dept {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-logo">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
            </div>
            <h1>COE Directory</h1>
        </div>
        <div class="user-section">
            <a href="index.html" class="portal-toggle-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Faculty Portal
            </a>
            <div class="user-profile">
                <span class="user-avatar" id="userAvatar">A</span>
                <span class="username-display">User: <strong id="displayUsername"></strong></span>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrapper">
            <div class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <input type="text" id="searchBox" placeholder="Search COE faculty by name..." autocomplete="off">
            <div id="searchSuggestions" class="search-suggestions-dropdown"></div>
        </div>

        <div class="sort-wrapper">
            <select id="sortOrder">
                <option value="asc">Ascending (A-Z)</option>
                <option value="desc">Descending (Z-A)</option>
            </select>
            <div class="select-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>
    </div>

    <div class="dept-container">
        <div class="dept-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
            Filter by Role / Designation
        </div>
        <div id="roleButtons" class="dept-buttons-grid"></div>
    </div>

    <div id="facultyList">Loading...</div>

    <script>
        // ===== AUTHENTICATION CHECK =====
        function checkAuthentication() {
            if (!sessionStorage.getItem("isAuthenticated")) {
                window.location.href = "auth.html";
                return false;
            }
            return true;
        }

        if (!checkAuthentication()) {
            throw new Error("Redirecting to authentication page...");
        }

        const username = sessionStorage.getItem("username");
        document.getElementById("displayUsername").textContent = username || "User";
        const initial = (username ? username.charAt(0) : "A").toUpperCase();
        document.getElementById("userAvatar").textContent = initial;

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", function () {
            sessionStorage.removeItem("isAuthenticated");
            sessionStorage.removeItem("username");
            window.location.href = "auth.html";
        });

        // ===== COE LIST CODE =====
        const facultyList = document.getElementById("facultyList");
        const sortOrder = document.getElementById("sortOrder");
        const searchBox = document.getElementById("searchBox");
        const roleButtonsContainer = document.getElementById("roleButtons");

        let allCOE = [];
        let activeRoleCategory = "";

        const rolesList = [
            "All Roles",
            "Technical Trainer",
            "Assistant Professor",
            "Soft Skill Trainer",
            "Student Success Officer",
            "Others"
        ];

        function getRoleCategory(designation) {
            if (!designation) return "Others";
            const d = designation.trim().toUpperCase();
            if (d.includes("TECHNICAL TRAINER") || d.includes("PLACEMENT PROGRAMMING TRAINER")) {
                return "Technical Trainer";
            }
            if (d.includes("ASSISTANT PROFESSOR") || d.includes("ASST.PROFFESSOR") || d.includes("ASSOCIATE PROFESSOR")) {
                return "Assistant Professor";
            }
            if (d.includes("SOFT SKILL")) {
                return "Soft Skill Trainer";
            }
            if (d.includes("STUDENT SUCCESS")) {
                return "Student Success Officer";
            }
            return "Others";
        }

        function createFacultyCard(faculty, idx) {
            const card = document.createElement("div");
            card.className = "faculty-card";
            card.style.animationDelay = `${idx * 0.03}s`;

            const initials = faculty.DisplayName
                .trim()
                .split(/\s+/)
                .map(n => n[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();

            card.innerHTML = `
                <div class="faculty-avatar">${initials}</div>
                <div class="faculty-info">
                    <h3>${faculty.DisplayName}</h3>
                    <p class="designation">${faculty.Designation || "COE Member"}</p>
                    <div class="card-badges">
                        <span class="dept-badge">${faculty.RoleCategory}</span>
                        ${faculty.Email ? `<span class="email-badge" title="${faculty.Email}">${faculty.Email}</span>` : ''}
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            `;

            card.addEventListener("click", () => {
                sessionStorage.setItem('selectedCOERole', activeRoleCategory);
                window.location.href = `coe_faculty.html?id=${faculty.OriginalIndex}`;
            });

            facultyList.appendChild(card);
        }

        function renderFacultyList() {
            facultyList.innerHTML = "";
            let filtered = [...allCOE];

            const searchText = searchBox.value.trim().toLowerCase();

            // Search
            if (searchText !== "") {
                filtered = filtered.filter(f => f.DisplayName.toLowerCase().includes(searchText));
            }

            // Role Category Filter
            if (activeRoleCategory !== "" && activeRoleCategory !== "All Roles") {
                filtered = filtered.filter(f => f.RoleCategory === activeRoleCategory);
            }

            // Sorting
            filtered.sort((a, b) => {
                const nameA = a.DisplayName.toUpperCase();
                const nameB = b.DisplayName.toUpperCase();
                if (sortOrder.value === "asc") {
                    return nameA.localeCompare(nameB);
                } else {
                    return nameB.localeCompare(nameA);
                }
            });

            if (filtered.length === 0) {
                facultyList.innerHTML = `
                    <div class="no-results">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                        <span>No faculty found matching the criteria.</span>
                    </div>
                `;
                return;
            }

            filtered.forEach((faculty, idx) => {
                createFacultyCard(faculty, idx);
            });
        }

        function populateRoleButtons() {
            roleButtonsContainer.innerHTML = "";
            rolesList.forEach(role => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "dept-btn" + ((activeRoleCategory === role || (activeRoleCategory === "" && role === "All Roles")) ? " active" : "");
                btn.textContent = role;
                btn.addEventListener("click", () => {
                    setActiveRole(role === "All Roles" ? "" : role);
                });
                roleButtonsContainer.appendChild(btn);
            });
        }

        function setActiveRole(role) {
            activeRoleCategory = role;
            sessionStorage.setItem('lastSelectedCOERole', role);

            const buttons = document.querySelectorAll(".dept-btn");
            buttons.forEach(btn => {
                const isAllBtn = btn.textContent === "All Roles";
                if ((isAllBtn && role === "") || (!isAllBtn && btn.textContent === role)) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });

            renderFacultyList();
            facultyList.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        // Fetch COE Data
        fetch("COE.json")
            .then(res => res.json())
            .then(data => {
                allCOE = data.map((item, index) => {
                    return {
                        OriginalIndex: index,
                        DisplayName: item["FULL NAME"] || "Unnamed Member",
                        Designation: item["DESIGNATION"] || "COE Member",
                        Email: item["EMAIL"],
                        RoleCategory: getRoleCategory(item["DESIGNATION"])
                    };
                });

                // Restore last selected role filter
                const savedRole = sessionStorage.getItem('selectedCOERole') || sessionStorage.getItem('lastSelectedCOERole');
                if (savedRole) {
                    activeRoleCategory = savedRole === "All Roles" ? "" : savedRole;
                    sessionStorage.removeItem('selectedCOERole'); // Clear one-time return filter
                }

                populateRoleButtons();
                renderFacultyList();
            })
            .catch(error => {
                console.error("Error loading COE data:", error);
                facultyList.innerHTML = `
                    <div class="no-results" style="color:red;">
                        Unable to load COE data.
                    </div>
                `;
            });

        sortOrder.addEventListener("change", renderFacultyList);
        searchBox.addEventListener("input", renderFacultyList);

        // ===== AUTOCOMPLETE SUGGESTIONS =====
        const searchSuggestions = document.getElementById("searchSuggestions");

        searchBox.addEventListener("input", function () {
            const query = this.value.trim().toLowerCase();
            if (query === "") {
                searchSuggestions.innerHTML = "";
                searchSuggestions.style.display = "none";
                return;
            }

            const matches = allCOE.filter(f => 
                f.DisplayName.toLowerCase().includes(query)
            ).slice(0, 8);

            if (matches.length === 0) {
                searchSuggestions.innerHTML = '<div style="padding: 14px; text-align: center; color: #64748b; font-size: 13px; font-weight: 500;">No matches found</div>';
                searchSuggestions.style.display = "block";
                return;
            }

            searchSuggestions.innerHTML = "";
            matches.forEach(faculty => {
                const item = document.createElement("div");
                item.className = "suggestion-item";
                item.innerHTML = `
                    <span class="suggestion-name">${faculty.DisplayName}</span>
                    <span class="suggestion-dept">${faculty.Designation}</span>
                `;
                item.addEventListener("click", function () {
                    searchBox.value = faculty.DisplayName;
                    searchSuggestions.style.display = "none";
                    searchSuggestions.innerHTML = "";

                    // Reset role filter if mismatch
                    if (activeRoleCategory !== "" && faculty.RoleCategory !== activeRoleCategory) {
                        setActiveRole("");
                    } else {
                        renderFacultyList();
                    }

                    // Find and scroll
                    setTimeout(() => {
                        const cards = Array.from(document.querySelectorAll(".faculty-card"));
                        const targetCard = cards.find(card => 
                            card.querySelector("h3").textContent === faculty.DisplayName
                        );
                        if (targetCard) {
                            targetCard.scrollIntoView({ behavior: "smooth", block: "center" });
                            targetCard.style.transition = "all 0.3s ease";
                            targetCard.style.borderColor = "#10b981";
                            targetCard.style.boxShadow = "0 0 0 4px rgba(16, 185, 129, 0.2)";
                            setTimeout(() => {
                                targetCard.style.borderColor = "";
                                targetCard.style.boxShadow = "";
                            }, 1500);
                        }
                    }, 100);
                });
                searchSuggestions.appendChild(item);
            });
            searchSuggestions.style.display = "block";
        });

        document.addEventListener("click", function (e) {
            if (!searchBox.contains(e.target) && !searchSuggestions.contains(e.target)) {
                searchSuggestions.style.display = "none";
            }
        });

        searchBox.addEventListener("focus", function () {
            if (this.value.trim() !== "") {
                searchSuggestions.style.display = "block";
            }
        });
    </script>
</body>

</html>
